<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matemática RPG - Início</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0a0f2c 0%, #1a1f4c 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 600px;
      padding: 40px 20px;
      animation: fadeInDown 0.8s ease-out;
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header {
      margin-bottom: 50px;
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 48px;
      color: #f5c542;
      text-shadow: 
        0 0 20px rgba(245, 197, 66, 0.8),
        0 0 40px rgba(245, 197, 66, 0.4),
        0 2px 10px rgba(0, 0, 0, 0.8);
      margin-bottom: 15px;
      letter-spacing: 2px;
      animation: glow 2s ease-in-out infinite;
      font-weight: 800;
    }

    @keyframes glow {
      0%, 100% {
        text-shadow: 
          0 0 20px rgba(245, 197, 66, 0.8),
          0 0 40px rgba(245, 197, 66, 0.4),
          0 2px 10px rgba(0, 0, 0, 0.8);
      }
      50% {
        text-shadow: 
          0 0 30px rgba(245, 197, 66, 1),
          0 0 60px rgba(245, 197, 66, 0.6),
          0 2px 10px rgba(0, 0, 0, 0.8);
      }
    }

    .sub {
      color: #e0e0e0;
      font-size: 16px;
      margin: 10px 0;
      letter-spacing: 0.5px;
      animation: fadeIn 0.8s ease-out 0.3s both;
      line-height: 1.6;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .alerta {
      color: #ff6b6b;
      margin: 20px 0;
      font-weight: bold;
      padding: 15px;
      background: rgba(255, 107, 107, 0.1);
      border: 2px solid #ff6b6b;
      border-radius: 12px;
      animation: slideInAlert 0.5s ease-out 0.5s both;
      display: none;
    }

    .alerta.show {
      display: block;
    }

    @keyframes slideInAlert {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .menu {
      margin-top: 40px;
      padding: 30px;
      background: rgba(20, 25, 50, 0.6);
      border: 2px solid rgba(245, 197, 66, 0.3);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      animation: slideInUp 0.8s ease-out 0.4s both;
    }

    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    button {
      width: 100%;
      padding: 18px 20px;
      margin: 12px 0;
      font-size: 18px;
      border-radius: 15px;
      border: 2px solid #f5c542;
      background: linear-gradient(135deg, rgba(245, 197, 66, 0.1), rgba(245, 197, 66, 0.05));
      color: #f5c542;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 
        0 5px 15px rgba(245, 197, 66, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
      animation: fadeInButton 0.6s ease-out both;
    }

    button:nth-child(1) { animation-delay: 0.5s; }
    button:nth-child(3) { animation-delay: 0.6s; }
    button:nth-child(5) { animation-delay: 0.7s; }
    button:nth-child(7) { animation-delay: 0.8s; }

    @keyframes fadeInButton {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s ease;
    }

    button:hover::before {
      left: 100%;
    }

    .principal {
      background: linear-gradient(135deg, #f5c542 0%, #d4a017 100%);
      color: #0a0f2c;
      border-color: #f5c542;
      font-weight: bold;
      font-size: 20px;
    }

    .principal::before {
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 
        0 12px 25px rgba(245, 197, 66, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
      border-color: #f5c542;
    }

    .principal:hover {
      box-shadow: 
        0 12px 30px rgba(245, 197, 66, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
      transform: translateY(-5px) scale(1.02);
    }

    button:active {
      transform: translateY(-1px);
    }

    .info {
      font-size: 13px;
      color: #f5c542;
      margin-top: -8px;
      margin-bottom: 15px;
      font-weight: 500;
      letter-spacing: 0.5px;
      animation: fadeIn 0.8s ease-out 0.6s both;
    }

    .rodape {
      margin-top: 50px;
      font-size: 14px;
      color: #aaa;
      animation: fadeIn 0.8s ease-out 0.8s both;
      letter-spacing: 0.5px;
    }

    /* Efeito de fundo animado */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.3;
    }

    .orb1 {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, #f5c542, transparent);
      top: -50px;
      right: -50px;
      animation: float 20s infinite ease-in-out;
    }

    .orb2 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #00d4ff, transparent);
      bottom: -100px;
      left: -100px;
      animation: float 25s infinite ease-in-out reverse;
    }

    @keyframes float {
      0%, 100% {
        transform: translate(0, 0);
      }
      25% {
        transform: translate(30px, -30px);
      }
      50% {
        transform: translate(-20px, 20px);
      }
      75% {
        transform: translate(20px, 30px);
      }
    }

    /* ========== BOTÃO ADM NO CANTO ========== */
    .btn-adm-flutuante {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, #ff4444 0%, #cc0000 100%);
      border: 3px solid #ff6666;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      box-shadow: 0 5px 20px rgba(255, 68, 68, 0.5);
      transition: all 0.3s ease;
      z-index: 100;
      animation: pulse-adm 2s ease-in-out infinite;
    }

    @keyframes pulse-adm {
      0%, 100% {
        box-shadow: 0 5px 20px rgba(255, 68, 68, 0.5);
        transform: scale(1);
      }
      50% {
        box-shadow: 0 8px 30px rgba(255, 68, 68, 0.8);
        transform: scale(1.05);
      }
    }

    .btn-adm-flutuante:hover {
      transform: scale(1.1);
      box-shadow: 0 10px 40px rgba(255, 68, 68, 0.8);
    }

    .btn-adm-flutuante-tooltip {
      position: absolute;
      right: 90px;
      background: rgba(255, 68, 68, 0.95);
      color: white;
      padding: 10px 15px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .btn-adm-flutuante:hover .btn-adm-flutuante-tooltip {
      opacity: 1;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 36px;
      }

      .sub {
        font-size: 14px;
      }

      button {
        font-size: 16px;
        padding: 16px 15px;
      }

      .menu {
        padding: 20px;
      }

      .container {
        padding: 30px 15px;
      }

      .btn-adm-flutuante {
        width: 60px;
        height: 60px;
        font-size: 28px;
        bottom: 20px;
        right: 20px;
      }

      .btn-adm-flutuante-tooltip {
        right: 80px;
        font-size: 11px;
      }
    }
  </style>
</head>

<body>

  <!-- Fundo animado -->
  <div class="bg-animation">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
  </div>

  <!-- BOTÃO ADM FLUTUANTE -->
  <button class="btn-adm-flutuante" onclick="abrirPainelADM()">
    ⚙️
    <div class="btn-adm-flutuante-tooltip">Painel do ADM</div>
  </button>

  <div class="container">
    <div class="header">
      <h1>⚔️ MATEMÁTICA RPG ⚔️</h1>
      <p class="sub">Resolva equações. Derrote monstros. Torne-se uma lenda.</p>
      <p class="sub">Crie ou acesse seu personagem para jogar.</p>
    </div>

    <p id="erro" class="alerta">Crie ou acesse seu personagem primeiro.</p>

    <div class="menu">

      <button class="principal" onclick="comecar()">
        ⚡ Começar Aventura
      </button>
      <div class="info">💪 Custa 10 de energia para começar</div>

      <button onclick="window.open('criar.html', '_blank')">
        🧙 Criar Personagem
      </button>

      <button onclick="window.location.href='personagem.html'">
        👤 Ver Personagem
      </button>

      <button onclick="window.location.href='ranks.html'">
        🏆 Classificações
      </button>

    </div>

    <div class="rodape">
      💾 Salvar &nbsp;&nbsp; 🗑️ Limpar economia
    </div>
  </div>

  <script>
    function comecar() {
      let nome = localStorage.getItem("personagem_nome");

      if (!nome) {
        const erroEl = document.getElementById("erro");
        erroEl.classList.add("show");
        erroEl.innerText = "⚠️ Crie ou acesse seu personagem primeiro!";
        setTimeout(() => {
          erroEl.classList.remove("show");
        }, 3000);
      } else {
        window.location.href = "aventura.html";
      }
    }

    function abrirPainelADM() {
      window.location.href = 'admin.html';
    }
  </script>

</body>
</html>
